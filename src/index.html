<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema com Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #fff;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }

    input {
      width: 250px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 1rem;
      transition: 0.3s;
    }

    input:focus {
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }

    button {
      width: 250px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: #4facfe;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4facfe;
      color: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    #loginArea {
      margin-top: 30px;
    }

    .login-container {
      display: flex;
      flex-direction: column; /* tudo embaixo */
      gap: 12px;
      align-items: center;
    }

    #app {
      margin-top: 30px;
      width: 80%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      color: #fff;
    }

    #blog {
      margin-top: 40px;
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 20px;
      text-align: left;
      display: none; /* começa escondido */
    }

    #blog h2 {
      margin-bottom: 15px;
      color: #fff;
    }

    article {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <!-- Área de login -->
  <div id="loginArea">
    <h1>Cadastre-se e entre no sistema</h1>
    <div class="login-container">
      <input type="text" id="username" placeholder="Digite seu nome de usuário">
      <input type="password" id="password" placeholder="Digite sua senha">
      <button id="loginButton">Entrar</button>
      <button id="registerButton">Cadastrar</button>
    </div>
  </div>

  <main id="app">
    <!-- Conteúdo principal do app -->
  </main>

  <!-- Seção do Blog -->
  <section id="blog">
    <h2>Blog</h2>
    <article>
      <h3>Postagem 1</h3>
      <p>Este é um exemplo de postagem no blog. Você pode escrever qualquer conteúdo aqui.</p>
    </article>

    <article>
      <h3>Postagem 2</h3>
      <p>Mais um exemplo de artigo. O blog pode ser usado para notícias, textos pessoais ou qualquer outro tema.</p>
    </article>
  </section>

  <script src="script.js"></script>
</body>
</html>
