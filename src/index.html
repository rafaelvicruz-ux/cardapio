<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Blogsphere</title>
  <!-- Font Awesome 6 (ícones gratuitos) --><!-- bcryptjs para hash de senhas -->
  <script src="script/main.js"></script>
  
   <link rel="stylesheet" href="styles/login.css">
   <link rel="stylesheet" href="styles/globals.css">
</head>
<body>

<!-- TELA LOGIN (animada) -->
<div id="authContainer" class="auth-overlay">
  <div id="loginCard" class="auth-card">
    <i class="fas fa-video" style="font-size: 2.5rem; color: #667eea; margin-bottom: 0.5rem;"></i>
    <h2>BlogSphere</h2>
    <div class="auth-sub">Entre no universo de canais</div>
    <div id="loginError" class="error-msg" style="display: none;"></div>
    <div class="input-group"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="Usuário" autocomplete="username"></div>
    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Senha" autocomplete="current-password"></div>
    <button class="btn-auth" id="btnLoginAction"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    <button class="btn-auth btn-secondary" id="showRegisterBtn"><i class="fas fa-user-plus"></i> Criar conta</button>
  </div>

  <div id="registerCard" class="auth-card" style="display: none;">
    <i class="fas fa-feather-alt" style="font-size: 2rem; color: #f97316;"></i>
    <h2>Criar Conta</h2>
    <div class="auth-sub">Junte-se à comunidade</div>
    <div id="regError" class="error-msg" style="display: none;"></div>
    <div class="input-group"><i class="fas fa-user-circle"></i><input type="text" id="regUsername" placeholder="Usuário criativo"></div>
    <div class="input-group"><i class="fas fa-key"></i><input type="password" id="regPassword" placeholder="Senha"></div>
    <button class="btn-auth" id="btnRegisterAction"><i class="fas fa-check-circle"></i> Cadastrar</button>
    <div class="switch-link">Já tem conta? <span id="backToLoginBtn">Fazer login</span></div>
  </div>
</div>

<!-- BLOG PRINCIPAL -->
<div class="blog-screen" id="blogScreen">
  <div class="blog-header">
    <h1><i class="fas fa-glasses"></i> Blog de Canais</h1>
    <div class="user-info">
      <span><i class="fas fa-user-astronaut"></i> <span id="currentUserName"></span></span>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
  </div>
  <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
    <button class="btn-criar-canal" id="openModalCanalBtn"><i class="fas fa-plus-circle"></i> Criar novo canal</button>
  </div>
  <h2 class="channels-title"><i class="fas fa-tower-broadcast"></i> Seus canais</h2>
  <div id="channelsGrid" class="channels-grid"></div>
</div>

<!-- TELA DE CANAL (posts) -->
<div class="blog-screen channel-screen" id="channelScreen" style="display: none;"></div>

<!-- MODAL CRIAR/EDITAR CANAL -->
<div id="modalCanal" class="modal">
  <div class="modal-content">
    <h2><i class="fas fa-pen-fancy"></i> Canal</h2>
    <div class="form-group"><label>Nome do canal *</label><input type="text" id="canalNome" placeholder="ex: Viagens, Games"></div>
    <div class="form-group"><label>Descrição</label><textarea id="canalDesc" rows="2" placeholder="Sobre o que é esse canal?"></textarea></div>
    <div class="form-group"><label>Capa (imagem)</label><input type="file" id="capaInput" accept="image/*"><img id="capaPreview" class="preview-capa" style="display: none;"></div>
    <div class="modal-buttons"  style="ndisplay: flex; gap: 1rem; justify-content: flex-end;">
      <button class="btn-cancelar" style="background:#cbd5e1; border:none; padding:8px 20px; border-radius:2rem;" id="closeModalBtn">Cancelar</button>
      <button class="btn-salvar" id="saveCanalBtn">Salvar</button>
    </div>
  </div>
</div>
</body>
</html>
