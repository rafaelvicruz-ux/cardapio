<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio + Lista de Compras</title>
  <style>
    /* Reset básico */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

/* Fundo da página */
body {
  background: linear-gradient(135deg, #ff7e5f, #feb47b);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Container principal */
main, body > h1, #username, #password, #loginButton #registerbutton {
  display: block;
}

/* Caixa de login */
body {
  flex-direction: column;
  text-align: center;
  color: #fff;
}

h1 {
  margin-bottom: 20px;
  font-size: 1.8rem;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

/* Inputs */
input {
  width: 250px;
  padding: 12px;
  margin: 10px auto;
  border: none;
  border-radius: 8px;
  outline: none;
  font-size: 1rem;
  transition: 0.3s;
}

input:focus {
  box-shadow: 0 0 8px rgba(255,255,255,0.8);
}

/* Botão */
button {
  width: 250px;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #fff;
  color: #ff7e5f;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff7e5f;
  color: #fff;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* Área principal do app */
#app {
  margin-top: 30px;
  width: 80%;
  max-width: 600px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 20px;
  color: #fff;
}


  </style>
</head>
<body>
  <h1>cadastre e entre no maior sistema de receitas</h1>
  <input type="text" id="username" placeholder="Digite seu nome de usuário">
  <input type="password" id="password" placeholder="Digite sua senha">
  <button onclick="entrar()" id="loginButton">Entrar</button>
  <button onclick="entrarecriar()" id="registerButton">Cadastrar</button>
  <main id="app"></main>
  <script src="script.js"></script>
</body>
</html>
